# Supply-chain gate for the Rust dependency tree: RustSec advisories, license policy, and
# source provenance. Run with `just audit` (or `cargo deny check`); also enforced in CI.

[graph]
# Soloist ships x86_64 Linux only (D2), so only that target's dependency tree is checked —
# this prunes platform-specific crates that never reach a build.
targets = ["x86_64-unknown-linux-gnu"]

[advisories]
# Vulnerabilities and unsound advisories fail the gate everywhere (the default). Unmaintained
# advisories are scoped to crates Soloist depends on directly: the transitive tree is almost
# entirely Tauri's GTK3 Linux GUI bindings, which are upstream-unmaintained with no fix here.
unmaintained = "workspace"
# Add an entry here, each with a written reason, only when a vulnerability has no fix and the
# risk is knowingly accepted.
ignore = [
    # Two DoS advisories against quick-xml 0.39.4: a quadratic-time duplicate-attribute check on
    # a crafted start tag (0194) and unbounded namespace-declaration allocation in NsReader (0195).
    # Both are reached only transitively via plist -> tauri-utils (Tauri's bundler/plist parsing);
    # Soloist parses no untrusted XML through that path. plist 1.9.0 pins quick-xml to 0.39.x with
    # no in-range patched release, so the only fix is a full Tauri-stack upgrade — tracked
    # separately, out of scope for a release cut. Revisit when tauri-utils ships a patched plist.
    { id = "RUSTSEC-2026-0194", reason = "transitive quick-xml via plist/tauri-utils; no untrusted-XML path in Soloist; no in-range fix" },
    { id = "RUSTSEC-2026-0195", reason = "transitive quick-xml via plist/tauri-utils; no untrusted-XML path in Soloist; no in-range fix" },
]

[licenses]
# The dependency tree must stay permissively licensed, matching Soloist's own MIT/Apache-2.0.
# Anything outside this list fails the gate until it is reviewed and added here.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]

[bans]
# Duplicate versions are reported, not failed — they are common transitively and are a size,
# not a correctness or licensing, concern (tracked separately under the size budget).
multiple-versions = "warn"
wildcards = "warn"

[sources]
# crates.io is the only sanctioned source; an unknown registry or git remote fails the gate.
unknown-registry = "deny"
unknown-git = "deny"
