name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: crates/app/ui/pnpm-lock.yaml

      - name: Install UI dependencies
        run: pnpm install --frozen-lockfile
        working-directory: crates/app/ui

      - name: Rust format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Rust tests
        run: cargo test --workspace --locked

      - name: Dependency-direction guard
        run: ./scripts/check-core-deps.sh

      - name: File-size guard (warn-only)
        run: ./scripts/check-file-size.sh

      - name: UI typecheck
        run: pnpm typecheck
        working-directory: crates/app/ui

      - name: UI lint
        run: pnpm lint
        working-directory: crates/app/ui

      - name: UI format check
        run: pnpm run format:check
        working-directory: crates/app/ui

      - name: UI tests
        run: pnpm test
        working-directory: crates/app/ui

  bundle:
    runs-on: ubuntu-22.04
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: crates/app/ui/pnpm-lock.yaml

      - name: Install UI dependencies
        run: pnpm install --frozen-lockfile
        working-directory: crates/app/ui

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build .deb bundle
        run: cargo tauri build --bundles deb
        working-directory: crates/app

      - uses: actions/upload-artifact@v4
        with:
          name: soloist-deb
          path: target/release/bundle/deb/*.deb
          if-no-files-found: error

  smoke:
    runs-on: ubuntu-22.04
    needs: bundle
    steps:
      - name: Download the .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: soloist-deb
          path: deb

      - name: Install runtime deps + Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-0 libgtk-3-0 \
            libayatana-appindicator3-1 xvfb dbus-x11

      - name: Install the .deb
        run: sudo dpkg -i deb/*.deb || sudo apt-get install -f -y

      - name: Verify shared libraries resolve (catches glibc/ABI drift)
        run: |
          if ldd /usr/bin/soloist | grep -i "not found"; then
            echo "::error::soloist has unresolved shared libraries on ubuntu-22.04 (built too new?)"
            exit 1
          fi
          echo "all shared libraries resolve on ubuntu-22.04"

      - name: Launch under Xvfb (startup smoke; non-gating)
        run: |
          xvfb-run -a -s "-screen 0 1280x800x24" timeout 8 /usr/bin/soloist > run.log 2>&1 &
          pid=$!
          sleep 5
          if kill -0 "$pid" 2>/dev/null; then
            echo "soloist started and stayed up under Xvfb"
            kill "$pid" 2>/dev/null || true
          else
            echo "::warning::soloist exited early under Xvfb; startup log follows"
            cat run.log || true
          fi
